services:
  repokeeper:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./repokeeper.config.ts:/app/repokeeper.config.ts:ro
      - repokeeper-logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - repokeeper-net

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/templates/default.conf.template:ro
      - certbot-webroot:/var/www/certbot:ro
      - certbot-certs:/etc/letsencrypt:ro
    environment:
      - DOMAIN=${DOMAIN:?DOMAIN env var is required}
    depends_on:
      repokeeper:
        condition: service_healthy
    networks:
      - repokeeper-net

  certbot:
    image: certbot/certbot
    volumes:
      - certbot-webroot:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done'"

volumes:
  repokeeper-logs:
  certbot-webroot:
  certbot-certs:

networks:
  repokeeper-net:
